name: Reusable OWASP ZAP DAST

on:
  workflow_call:
    inputs:
      target-url:
        type: string
        default: 'https://example.com'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ inputs.target-url }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          allow_issue_writing: false

      # 1. Rename the file on the runner workspace to prevent errors
      - name: Rename ZAP Report File
        if: always()
        run: mv report_html.html zap-report.html

      # 2. Upload the renamed file safely using v4 APIs
      - name: Upload ZAP Report Artifact (v4 compatibility)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html
